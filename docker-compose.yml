version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: connect_marketing
      POSTGRES_USER: cm_user
      POSTGRES_PASSWORD: cm_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./drizzle/0000_init.sql:/docker-entrypoint-initdb.d/init.sql

  api:
    build: .
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://cm_user:cm_secret@db:5432/connect_marketing
      ALLOWED_ORIGINS: http://localhost:5173,https://yourdomain.com
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_SECURE: "false"
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: Connect Marketing <noreply@connectmarketing.com>
      EMAIL_NOTIFY: ${EMAIL_NOTIFY}
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      CONTACT_RATE_LIMIT_MAX: 5

volumes:
  pgdata:
